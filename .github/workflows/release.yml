name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 customtkinter>=5.2

      - name: Build exe
        run: |
          python build_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: technics_gui
          path: dist/technics_gui.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: technics_gui

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: technics_gui.exe
          generate_release_notes: true
